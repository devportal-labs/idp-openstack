apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  description: ${{ values.description }}
  annotations:
    github.com/project-slug: devportal-labs/${{ values.name }}
    backstage.io/techdocs-ref: dir:.
  tags:
    - ${{ values.language }}
    - microservice
spec:
  type: service
  lifecycle: production
  owner: ${{ values.owner }}
  system: devportal-platform
